<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>トキメグリ｜映え適時プラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root{
    --shikkui:#2c2720; --shikkui-dim:#726b5e;
    --kin:#C67C15; --kin-soft:#B06E12;
    --ai:#16223F; --shu:#C7452B; --green:#2F8F52;
    --panel:rgba(255,255,255,.95);
    --panel-2:#ffffff;
    --panel-line:rgba(24,20,14,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#efeae1;font-family:"Zen Kaku Gothic New",system-ui,sans-serif;color:var(--shikkui)}
  #map{position:fixed;inset:0;background:#efeae1;z-index:1;transform-origin:center center;will-change:transform}
  .leaflet-div-icon{background:transparent;border:none}
  .leaflet-container{background:#efeae1;font-family:inherit;outline:none}
  .leaflet-control-attribution{background:rgba(255,255,255,.7)!important;color:#555!important;font-size:9px!important;padding:2px 6px!important}
  .leaflet-control-attribution a{color:#8a6a1f!important}
  .leaflet-tile-pane{filter:saturate(.28) brightness(1.16) contrast(.9);opacity:.5}
  #mapdim{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(150% 130% at 50% 42%,transparent 62%,rgba(40,32,20,.05))}
  #skywash{position:fixed;inset:0;z-index:3;pointer-events:none;transition:background .25s,opacity .25s}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 14px;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(255,255,255,.15) 62%,transparent)}
  .brand{pointer-events:auto}
  .brand .logo{font-family:"Shippori Mincho",serif;font-weight:800;font-size:19px;letter-spacing:.12em;color:#2c2720;line-height:1;display:flex;align-items:center;gap:7px;text-shadow:0 1px 3px rgba(255,255,255,.7)}
  .brand .logo .mark{width:11px;height:11px;border-radius:50%;background:#e8dcc0;flex:none}
  .rightcol{display:flex;align-items:center;gap:7px;pointer-events:auto}
  .clock{text-align:right;background:var(--panel);border:1px solid var(--panel-line);border-radius:12px;padding:6px 10px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 22px -14px rgba(0,0,0,.7)}
  .clock .t{font-family:"Shippori Mincho",serif;font-weight:700;font-size:18px;line-height:1;letter-spacing:.02em;color:var(--shikkui);font-variant-numeric:tabular-nums}
  .clock .phase{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;font-size:9.5px;letter-spacing:.05em;color:var(--shikkui-dim);font-weight:600}
  .iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--panel-line);background:var(--panel);color:var(--shikkui);font-size:16px;cursor:pointer;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 22px -14px rgba(0,0,0,.7);display:grid;place-items:center}
  .iconbtn:hover{border-color:var(--kin)}

  .searchrow{position:fixed;top:calc(56px + env(safe-area-inset-top));left:12px;right:12px;z-index:19;display:flex;gap:7px;align-items:center}
  .seg{display:flex;background:var(--panel);border:1px solid var(--panel-line);border-radius:999px;padding:2px;gap:2px;box-shadow:0 8px 22px -14px rgba(0,0,0,.6)}
  .seg button{border:none;background:transparent;color:var(--shikkui-dim);font-family:inherit;font-weight:700;font-size:11px;letter-spacing:.03em;padding:6px 10px;border-radius:999px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:4px}
  .seg button.on{background:#2c2720;color:#fff}
  .searchbox{flex:1;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--panel-line);border-radius:999px;padding:0 12px;box-shadow:0 8px 22px -14px rgba(0,0,0,.6)}
  .searchbox .si{font-size:12px;opacity:.7;flex:none}
  .searchbox input{flex:1;background:transparent;border:none;outline:none;color:var(--shikkui);font-family:inherit;font-size:13px;padding:9px 0}
  .searchbox input::placeholder{color:var(--shikkui-dim)}
  .searchbox .sclear{font-size:11px;color:var(--shikkui-dim);cursor:pointer;display:none;flex:none}
  .searchbox.filled .sclear{display:block}

  .catbar{position:fixed;top:calc(98px + env(safe-area-inset-top));left:0;right:0;z-index:18;display:flex;gap:7px;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .catbar::-webkit-scrollbar{display:none}
  .catbar .cchip{flex:none;display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--panel-line);color:var(--shikkui-dim);font-family:inherit;font-weight:700;font-size:12px;letter-spacing:.02em;padding:8px 13px;border-radius:999px;cursor:pointer;transition:.16s;box-shadow:0 8px 22px -16px rgba(0,0,0,.6)}
  .catbar .cchip.on{background:#2c2720;color:#fff;border-color:#2c2720}

  .legendpop{position:fixed;right:12px;top:calc(140px + env(safe-area-inset-top));z-index:17;background:var(--panel-2);border:1px solid var(--panel-line);border-radius:12px;padding:11px 13px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-size:11px;box-shadow:0 14px 34px -18px rgba(0,0,0,.8);opacity:0;transform:translateY(-6px);pointer-events:none;transition:.2s}
  .legendpop.on{opacity:1;transform:none;pointer-events:auto}

  .edgezone{position:fixed;top:118px;bottom:196px;right:0;width:48px;z-index:16;touch-action:none;display:flex;align-items:center;justify-content:flex-end}
  .edgezone .ez-grip{width:5px;height:72px;border-radius:99px;background:rgba(24,20,14,.16);margin-right:5px;transition:.18s;pointer-events:none}
  .edgezone.active .ez-grip{background:var(--kin);height:128px;width:6px}

  .loader{position:fixed;inset:0;z-index:50;display:grid;place-content:center;background:#f3f0e8;transition:opacity .6s;text-align:center}
  .loader.gone{opacity:0;pointer-events:none}
  .loader .lm{font-family:"Shippori Mincho",serif;font-weight:800;font-size:26px;letter-spacing:.2em;color:var(--shikkui)}
  .loader .ls{font-size:11px;letter-spacing:.3em;color:var(--kin-soft);margin-top:12px}
  .loader .bar{width:160px;height:2px;background:rgba(24,20,14,.16);border-radius:99px;margin:18px auto 0;overflow:hidden}
  .loader .bar i{display:block;height:100%;width:40%;background:var(--kin);border-radius:99px;animation:ld 1.1s ease-in-out infinite}
  @keyframes ld{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
</style>
</head>
<body>

<div id="map"></div>
<div id="mapdim"></div>
<div id="skywash"></div>

<div class="loader" id="loader">
  <div class="lm">トキメグリ</div>
  <div class="ls">MIYAE TIMING PLATFORM</div>
  <div class="bar"><i></i></div>
</div>

<div class="topbar">
  <div class="brand">
    <div class="logo"><span class="mark"></span>トキメグリ</div>
  </div>
  <div class="rightcol">
    <button class="iconbtn" id="rankBtn" title="今日のベスト">☆</button>
    <button class="iconbtn" id="legendBtn" title="凡例">?</button>
  </div>
</div>

<div class="searchrow">
  <div class="seg region" id="regionSeg"></div>
  <div class="searchbox"><span class="si">🔍</span><input id="searchInput" type="text" placeholder="スポット名で検索" autocomplete="off"><span class="sclear" id="searchClear">✕</span></div>
</div>
<div class="catbar" id="catBar"></div>

<div class="legendpop" id="legendPop">
  <div class="lt">ピンの見かた</div>
  <div class="note">丸写真＝名所／絵文字＝店。タップで詳細。</div>
</div>

<div class="edgezone" id="edgeZone"><div class="ez-grip"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
function boot(){
  const map = L.map('map',{zoomControl:false,attributionControl:true,minZoom:14,maxZoom:18,zoomSnap:0}).setView([35.9225, 139.4855], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  /* === 変更箇所: edgeZone のスワイプ感度とレスポンスを改善 === */
  const edge = document.getElementById('edgeZone');
  const mapEl = document.getElementById('map');
  const EGAIN = 1.0; // 感度を向上（2.2から1.0へ）
  let eDragging=false,eStartY=0,eStartZoom=0,ePreviewScale=1;

  edge.addEventListener('pointerdown',e=>{
    eDragging=true;eStartY=e.clientY;eStartZoom=map.getZoom();ePreviewScale=1;
    map.dragging.disable();
    try{edge.setPointerCapture(e.pointerId);}catch(_){}
    edge.classList.add('active');
    mapEl.style.transition='none';
    e.preventDefault();
  });

  edge.addEventListener('pointermove',e=>{
    if(!eDragging)return;
    const dy=eStartY-e.clientY;
    // 感度向上のためEGAINを反映
    const dz=Math.max(map.getMinZoom()-eStartZoom,Math.min(map.getMaxZoom()-eStartZoom,(dy/window.innerHeight)*EGAIN));
    ePreviewScale=Math.pow(2,dz);
    mapEl.style.transform='scale('+ePreviewScale+')';
    e.preventDefault();
  });

  function eEnd(){
    if(!eDragging)return; eDragging=false;
    const targetZoom=Math.max(map.getMinZoom(),Math.min(map.getMaxZoom(),eStartZoom+Math.log2(ePreviewScale)));
    mapEl.style.transition='transform .12s ease-out';
    mapEl.style.transform='scale(1)';
    map.dragging.enable();
    edge.classList.remove('active');
    // レスポンス向上のため40msに短縮
    setTimeout(()=>{ mapEl.style.transition=''; map.setZoom(targetZoom,{animate:true}); },40);
  }
  edge.addEventListener('pointerup',eEnd);
  edge.addEventListener('pointercancel',eEnd);
  
  setTimeout(()=>{document.getElementById('loader').classList.add('gone');},700);
}
boot();
</script>
</body>
</html>
